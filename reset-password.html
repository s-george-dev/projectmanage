<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - FieldHub</title>
  <link rel="icon" type="image/png" href="https://fieldhub.uk/assets/images/favicon-transparent.png">
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --surface-light: #2a2a2a;
      --primary-color: #bb86fc;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --border-color: #333;
      --danger: #cf6679;
      --success: #03dac6;
    }
    body { font-family: system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; overflow-x: hidden; }
    .container { width: 100%; max-width: 500px; background: var(--surface-color); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
    
    button { padding: 12px 20px; border-radius: 6px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; transition: opacity 0.2s; width: 100%; }
    button:hover { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    input { padding: 12px; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; width: 100%; margin-bottom: 15px; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- STEP 1: Request Email Link -->
  <div id="request-section" class="container">
    <div style="text-align: center; margin-bottom: 20px;">
      <img src="https://fieldhub.uk/assets/images/fieldhub-logo-transparent.png" alt="Logo" style="height: 150px;">
      <h2 style="margin-top: 0;">Reset Password</h2>
    </div>
    <p style="text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">Enter your email to receive a secure reset link.</p>
    
    <input type="email" id="reset-email" placeholder="Email Address" />
    <button id="send-btn">Send Reset Link</button>
    <p id="request-msg" style="text-align: center; font-size: 14px; margin-top: 15px; height: 15px;"></p>
    
    <p style="text-align: center; margin-top: 20px;">
      <a href="/" style="color: var(--primary-color); text-decoration: none; font-size: 14px;">← Back to Login</a>
    </p>
  </div>

  <!-- STEP 2: Enter New Password (Hidden until accessed via email link) -->
  <div id="recovery-section" class="container hidden">
    <div style="text-align: center; margin-bottom: 20px;">
      <img src="https://fieldhub.uk/assets/images/fieldhub-logo-transparent.png" alt="Logo" style="height: 150px;">
      <h2 style="margin-top: 0;">Set New Password</h2>
    </div>
    <p style="text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">Your link is valid. Please enter a new password below.</p>
    
    <input type="password" id="new-password" placeholder="New Password" />
    <button id="save-btn">Update Password</button>
    <p id="recovery-msg" style="text-align: center; font-size: 14px; margin-top: 15px; height: 15px;"></p>
  </div>

  <!-- Isolated Supabase Logic for Reset Flow -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    const supabaseUrl = 'https://hwuyvatkyyxfnyzxrcsm.supabase.co';
    const supabaseKey = 'sb_publishable_4opExcpgvIsblEQjDfqB3A_VMlCVNdG';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const requestSect = document.getElementById('request-section');
    const recoverySect = document.getElementById('recovery-section');
    const sendBtn = document.getElementById('send-btn');
    const saveBtn = document.getElementById('save-btn');

    // 1. Detect if the user arrived via an email recovery link
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        requestSect.classList.add('hidden');
        recoverySect.classList.remove('hidden');
      }
    });

    // 2. Handle Requesting the Link
    sendBtn.addEventListener('click', async () => {
      const email = document.getElementById('reset-email').value.trim();
      const msgEl = document.getElementById('request-msg');
      
      if (!email) {
        msgEl.style.color = 'var(--danger)';
        return msgEl.textContent = 'Please enter your email address.';
      }

      sendBtn.disabled = true;
      msgEl.style.color = 'var(--text-main)';
      msgEl.textContent = 'Sending...';

      // Tell Supabase to bounce the user right back to this specific page
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href.split('#')[0] 
      });

      if (error) {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = error.message;
        sendBtn.disabled = false;
      } else {
        msgEl.style.color = 'var(--success)';
        msgEl.textContent = 'Check your email for the reset link!';
      }
    });

    // 3. Handle Saving the New Password
    saveBtn.addEventListener('click', async () => {
      const newPassword = document.getElementById('new-password').value;
      const msgEl = document.getElementById('recovery-msg');

      if (!newPassword || newPassword.length < 6) {
        msgEl.style.color = 'var(--danger)';
        return msgEl.textContent = 'Password must be at least 6 characters.';
      }

      saveBtn.disabled = true;
      msgEl.style.color = 'var(--text-main)';
      msgEl.textContent = 'Updating password...';

      const { error } = await supabase.auth.updateUser({ password: newPassword });

      if (error) {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = error.message;
        saveBtn.disabled = false;
      } else {
        msgEl.style.color = 'var(--success)';
        msgEl.textContent = 'Password updated successfully! Redirecting...';
        
        // Bounce them back to the main app to login
        setTimeout(() => {
          window.location.href = '/'; 
        }, 2000);
      }
    });
  </script>
</body>
</html>
